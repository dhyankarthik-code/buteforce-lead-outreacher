services:
  - type: web
    name: buteforce-outreach
    rootDir: review_app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: admin@buteforce.com
      - key: SMTP_PASS
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: SHEET_ID
        value: 1KghW03YIgrvWhSPzKTgw_uyGU2BcMVtB5nP1tPZUdfQ
      - key: SHEET_NAME
        value: Clients detail
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: "993"
