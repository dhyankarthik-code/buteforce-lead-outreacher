<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteforce · Outreach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Design tokens ────────────────────────────────────────────────────────── */
:root {
  --bg:          #f5f6f8;
  --surface:     #ffffff;
  --surface-2:   #eef0f3;
  --border:      #e5e7eb;
  --border-2:    #d1d5db;
  --text:        #0a0a0a;
  --text-2:      #4b5563;
  --text-3:      #9ca3af;

  --yellow:      #FFFC01;
  --yellow-dim:  rgba(255,252,1,.12);
  --yellow-glow: rgba(255,252,1,.40);

  --green:       #16a34a;
  --green-dim:   rgba(22,163,74,.09);
  --amber:       #b45309;
  --amber-dim:   rgba(180,83,9,.09);
  --red:         #dc2626;
  --red-dim:     rgba(220,38,38,.09);
  --blue:        #2563eb;
  --blue-dim:    rgba(37,99,235,.09);
  --orange:      #ea580c;
  --orange-dim:  rgba(234,88,12,.09);

  --hover-tint:  rgba(0,0,0,.035);
  --mono: 'Cascadia Code','JetBrains Mono','Fira Code',ui-monospace,monospace;
}

[data-theme="dark"] {
  --bg:          #07090d;
  --surface:     #0d1018;
  --surface-2:   #13161f;
  --border:      #1e2535;
  --border-2:    #2a3246;
  --text:        #dde1ef;
  --text-2:      #7a8099;
  --text-3:      #3a3f52;
  --yellow-dim:  rgba(255,252,1,.07);
  --yellow-glow: rgba(255,252,1,.18);
  --green:       #22c763;
  --green-dim:   rgba(34,199,99,.10);
  --amber:       #f0a500;
  --amber-dim:   rgba(240,165,0,.08);
  --red:         #ef4455;
  --red-dim:     rgba(239,68,85,.08);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96,165,250,.09);
  --orange:      #fb923c;
  --orange-dim:  rgba(251,146,60,.09);
  --hover-tint:  rgba(255,255,255,.03);
}

/* ── Base ─────────────────────────────────────────────────────────────────── */
body {
  font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.brand-logo {
  height: 24px;
  width: auto;
  object-fit: contain;
  display: block;
}

[data-theme="dark"] .brand-logo {
  filter: brightness(1.15) contrast(1.05);
}

.brand-pipe {
  width: 1px;
  height: 14px;
  background: var(--border-2);
  flex-shrink: 0;
}

.brand-sub {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: .02em;
}

.header-stats {
  display: flex;
  align-items: center;
  gap: 1px;
  margin-left: auto;
  background: var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.stat-chip {
  padding: 4px 11px;
  background: var(--surface-2);
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 5px;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

.stat-chip strong { color: var(--text-2); font-weight: 700; }
.stat-chip.s-sent  strong { color: var(--green); }
.stat-chip.s-skip  strong { color: var(--red); }
.stat-chip.s-ready strong { color: var(--amber); }

.kbd-hints {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: var(--text-3);
  flex-shrink: 0;
}

kbd {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  padding: 0 4px;
  color: var(--text-2);
  line-height: 16px;
}

/* ── Icon buttons (bell, theme) ───────────────────────────────────────────── */
.icon-btn {
  position: relative;
  width: 30px;
  height: 30px;
  padding: 0;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 5px;
  color: var(--text-2);
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background .12s, border-color .12s, color .12s;
}
.icon-btn:hover { background: var(--border); color: var(--text); opacity: 1; }
.icon-btn svg { width: 14px; height: 14px; pointer-events: none; }
.icon-btn:focus-visible { box-shadow: 0 0 0 2px var(--yellow); outline: none; }

.icon-btn.has-unread {
  border-color: rgba(255,252,1,.7);
  background: var(--yellow-dim);
  color: var(--text);
}

.notif-badge {
  position: absolute;
  top: -5px;
  right: -5px;
  min-width: 16px;
  height: 16px;
  background: var(--yellow);
  color: #0a0a0a;
  font-size: 9px;
  font-weight: 800;
  border-radius: 99px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 3px;
  line-height: 1;
  letter-spacing: -.01em;
  font-family: 'Inter', sans-serif;
}

/* ── Progress bar ─────────────────────────────────────────────────────────── */
.progress-track {
  height: 2px;
  background: var(--border);
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--yellow);
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px var(--yellow-glow);
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
.sidebar {
  width: 256px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.sidebar-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-3);
}

.sidebar-progress {
  font-size: 11px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
  font-family: var(--mono);
  font-weight: 600;
}

.lead-list {
  overflow-y: auto;
  flex: 1;
}

.lc {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background .1s;
}

.lc:hover { background: var(--hover-tint); }

.lc.active {
  background: var(--yellow-dim);
  border-left: 2px solid var(--yellow);
  padding-left: 12px;
}

.lc.is-noemail { opacity: .32; cursor: default; pointer-events: none; }
.lc.is-sent    { opacity: .58; }
.lc.is-skipped { opacity: .45; }

.lc-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 5px;
}

.lc-company {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
  letter-spacing: -.01em;
}

.lc-spend {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  flex-shrink: 0;
  letter-spacing: -.02em;
}

.lc-bottom {
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sd-pending   { background: var(--text-3); }
.sd-generated { background: var(--amber); }
.sd-sent      { background: var(--green); }
.sd-skipped   { background: var(--red); opacity: .5; }
.sd-noemail   { background: var(--border-2); }

.lc-status { font-size: 10.5px; color: var(--text-3); }

.gdpr-pip {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--amber);
  margin-left: auto;
  flex-shrink: 0;
}

/* ── Main panel ───────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text-3);
  pointer-events: none;
}

.empty-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border-2);
  display: grid;
  place-items: center;
}

.empty-state p     { font-size: 13px; }
.empty-state small { font-size: 11px; }

.lead-bar {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.lead-bar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}

.lead-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
}

.spend-tag {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 800;
  color: #0a0a0a;
  background: var(--yellow);
  padding: 2px 10px;
  border-radius: 4px;
  letter-spacing: -.02em;
}

.lead-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.meta {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-2);
}

.meta-k {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
}

.meta a { color: var(--text-2); text-decoration: underline; text-decoration-color: var(--border-2); }
.meta a:hover { text-decoration-color: var(--text-2); }

.bar-sent {
  padding: 7px 20px;
  background: var(--green-dim);
  border-bottom: 1px solid rgba(22,163,74,.15);
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

.bar-gdpr {
  padding: 7px 20px;
  background: var(--amber-dim);
  border-bottom: 1px solid rgba(180,83,9,.12);
  font-size: 11px;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

[data-theme="dark"] .bar-gdpr { border-bottom-color: rgba(240,165,0,.12); }

.bar-noemail {
  padding: 9px 20px;
  background: var(--red-dim);
  border-bottom: 1px solid rgba(220,38,38,.15);
  font-size: 12px;
  color: var(--red);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.compose {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.email-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.eh-row {
  display: flex;
  align-items: center;
  height: 34px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.eh-row:last-child { border-bottom: none; }

.eh-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  width: 52px;
  flex-shrink: 0;
}

.eh-value { font-size: 12.5px; color: var(--text-2); flex: 1; }

.eh-input {
  font-family: 'Inter', inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  flex: 1;
  width: 100%;
}
.eh-input::placeholder { color: var(--text-3); font-weight: 400; font-style: italic; }

.body-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}

.body-ta {
  flex: 1;
  width: 100%;
  background: var(--bg);
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.8;
  padding: 16px 20px 32px;
  resize: none;
  overflow-y: auto;
}
.body-ta::placeholder { color: var(--text-3); font-style: italic; }

.body-counter {
  position: absolute;
  bottom: 8px;
  right: 16px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-3);
  pointer-events: none;
}

.notes-strip {
  height: 34px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.notes-k {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  flex-shrink: 0;
}

.notes-in {
  flex: 1;
  font-family: 'Inter', inherit;
  font-size: 12px;
  color: var(--text-2);
  background: none;
  border: none;
  outline: none;
}
.notes-in::placeholder { color: var(--text-3); }

.action-bar {
  height: 50px;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.ab-spacer { flex: 1; }

/* ── Buttons ──────────────────────────────────────────────────────────────── */
button {
  font-family: 'Inter', inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 0 14px;
  height: 32px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: opacity .12s, transform .1s, background .12s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  outline: none;
}

button:hover:not(:disabled) { opacity: .82; }
button:active:not(:disabled) { transform: scale(.98); }
button:disabled { opacity: .28; cursor: not-allowed; }
button:focus-visible { box-shadow: 0 0 0 2px var(--yellow); }

.btn-reset {
  background: transparent;
  color: var(--text-3);
  border: 1px solid var(--border-2);
}
.btn-reset:hover:not(:disabled) { color: var(--text-2); opacity: 1; }

.btn-generate {
  background: var(--yellow);
  color: #0a0a0a;
  font-weight: 700;
}

.btn-skip {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border-2);
}
.btn-skip:hover:not(:disabled) {
  color: var(--red);
  border-color: rgba(220,38,38,.35);
  background: var(--red-dim);
  opacity: 1;
}

.btn-send {
  background: var(--green);
  color: #ffffff;
  font-weight: 700;
  font-size: 13px;
  padding: 0 18px;
}
[data-theme="dark"] .btn-send { color: #071a0e; }

.bk {
  font-family: var(--mono);
  font-size: 9px;
  opacity: .5;
  background: rgba(10,10,10,.1);
  padding: 1px 4px;
  border-radius: 3px;
  line-height: 14px;
}
[data-theme="dark"] .bk { background: rgba(255,255,255,.1); }

.spin {
  width: 12px;
  height: 12px;
  border: 2px solid rgba(10,10,10,.2);
  border-top-color: #0a0a0a;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
[data-theme="dark"] .spin { border: 2px solid rgba(255,255,255,.2); border-top-color: white; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ────────────────────────────────────────────────────────────────── */
#toast {
  position: fixed;
  bottom: 18px;
  right: 18px;
  padding: 9px 15px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .18s, transform .18s;
  pointer-events: none;
  z-index: 9999;
  max-width: 300px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { background: var(--green-dim); border: 1px solid rgba(22,163,74,.25); color: var(--green); }
#toast.error   { background: var(--red-dim);   border: 1px solid rgba(220,38,38,.25); color: var(--red); }
#toast.info    { background: var(--surface-2); border: 1px solid var(--border-2);    color: var(--text-2); }

/* ── Research panel ───────────────────────────────────────────────────────── */
.research-panel {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.rp-head {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  cursor: pointer;
  user-select: none;
  transition: background .1s;
}
.rp-head:hover { background: var(--hover-tint); }

.rp-icon {
  font-size: 12px;
  flex-shrink: 0;
}

.rp-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  flex: 1;
}

.rp-sources {
  font-size: 10px;
  color: var(--text-3);
  font-family: var(--mono);
}

.rp-chevron {
  color: var(--text-3);
  font-size: 10px;
  transition: transform .18s;
  flex-shrink: 0;
}
.rp-chevron.open { transform: rotate(180deg); }

.rp-body {
  padding: 0 20px 12px;
  display: none;
  flex-direction: column;
  gap: 8px;
}
.rp-body.open { display: flex; }

.rp-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.rp-k {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  width: 86px;
  flex-shrink: 0;
  padding-top: 2px;
}

.rp-v {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.55;
  flex: 1;
}

.rp-row.rp-hooks .rp-k { color: #b89b00; }
[data-theme="dark"] .rp-row.rp-hooks .rp-k { color: var(--yellow); }
.rp-row.rp-hooks .rp-v {
  color: var(--text);
  background: var(--yellow-dim);
  border: 1px solid rgba(255,252,1,.18);
  border-radius: 5px;
  padding: 6px 9px;
  font-size: 11.5px;
}

/* ── Scrollbar ────────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

/* ═══════════════════════════════════════════════════════════════════════════
   NOTIFICATION CENTER
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Notification panel (dropdown) ──────────────────────────────────────── */
.notif-panel {
  position: fixed;
  top: 50px;
  right: 8px;
  width: 384px;
  max-height: calc(100vh - 68px);
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 8px;
  box-shadow: 0 8px 40px rgba(0,0,0,.12), 0 2px 10px rgba(0,0,0,.06);
  z-index: 1000;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
[data-theme="dark"] .notif-panel {
  box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 2px 10px rgba(0,0,0,.2);
}

.np-head {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.np-title {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-3);
  flex: 1;
}

.np-actions { display: flex; gap: 5px; }

.np-btn {
  font-family: 'Inter', inherit;
  font-size: 11px;
  font-weight: 600;
  padding: 0 9px;
  height: 24px;
  border: 1px solid var(--border-2);
  border-radius: 4px;
  background: var(--surface-2);
  color: var(--text-2);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  transition: background .1s, color .1s;
  white-space: nowrap;
}
.np-btn:hover:not(:disabled) { background: var(--border); color: var(--text); opacity: 1; }
.np-btn:disabled { opacity: .4; cursor: not-allowed; }

.np-list { overflow-y: auto; flex: 1; }

.np-empty {
  padding: 36px 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: var(--text-3);
  font-size: 12px;
  text-align: center;
}
.np-empty svg { opacity: .5; }

/* ── Notification item ────────────────────────────────────────────────────── */
.ni {
  padding: 11px 14px 11px 22px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background .1s;
}
.ni:hover { background: var(--hover-tint); }
.ni.is-read { opacity: .52; }

.ni-unread-dot {
  position: absolute;
  left: 9px;
  top: 16px;
  width: 5px;
  height: 5px;
  background: var(--yellow);
  border-radius: 50%;
  flex-shrink: 0;
}

.ni-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.ni-company {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  letter-spacing: -.01em;
}

/* ── Classification badges ────────────────────────────────────────────────── */
.cls-badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 99px;
  flex-shrink: 0;
  text-transform: uppercase;
  letter-spacing: .04em;
  line-height: 1.4;
}
.cls-interested        { background: var(--green-dim);  color: var(--green); }
.cls-meeting_requested { background: rgba(180,83,9,.10); color: var(--amber); }
.cls-question          { background: var(--blue-dim);   color: var(--blue); }
.cls-not_interested    { background: var(--red-dim);    color: var(--red); }
.cls-out_of_office     { background: var(--surface-2);  color: var(--text-2); }
.cls-unsubscribe       { background: var(--orange-dim); color: var(--orange); }
.cls-other             { background: var(--surface-2);  color: var(--text-3); }

.ni-preview {
  font-size: 11.5px;
  color: var(--text-2);
  line-height: 1.5;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  margin-bottom: 5px;
}

.ni-meta {
  font-size: 10.5px;
  color: var(--text-3);
  font-family: var(--mono);
  letter-spacing: -.01em;
}

/* ═══════════════════════════════════════════════════════════════════════════
   THREAD MODAL
   ═══════════════════════════════════════════════════════════════════════════ */

.thread-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.32);
  z-index: 2000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(3px);
}

.thread-modal {
  background: var(--surface);
  border-radius: 10px;
  width: 100%;
  max-width: 660px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,.22);
  border: 1px solid var(--border-2);
}

.tm-head {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}

.tm-head-left { display: flex; align-items: center; gap: 10px; }

.tm-company {
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
}

.tm-close {
  width: 28px;
  height: 28px;
  padding: 0;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 5px;
  color: var(--text-2);
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background .1s;
}
.tm-close:hover { background: var(--border); opacity: 1; }
.tm-close svg { width: 14px; height: 14px; }

.tm-body {
  padding: 16px 18px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

.tm-email-card {
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 12px 14px;
  background: var(--bg);
}
.tm-outreach { border-left: 3px solid var(--border-2); }
.tm-reply    { border-left: 3px solid var(--green); }

.tm-card-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-3);
  margin-bottom: 7px;
}

.tm-card-subject {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 3px;
  letter-spacing: -.01em;
}

.tm-card-meta {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 9px;
  font-family: var(--mono);
}

.tm-card-body {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.75;
  white-space: pre-wrap;
  max-height: 240px;
  overflow-y: auto;
  font-family: var(--mono);
}

.tm-arrow {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: var(--text-3);
  padding: 0 4px;
  font-weight: 500;
}

.tm-ai-card {
  background: var(--yellow-dim);
  border: 1px solid rgba(255,252,1,.28);
  border-radius: 7px;
  padding: 12px 14px;
}
[data-theme="dark"] .tm-ai-card { border-color: rgba(255,252,1,.10); }

.tm-ai-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--text-2);
  margin-bottom: 8px;
}
.tm-ai-label svg { width: 11px; height: 11px; flex-shrink: 0; }

.tm-ai-reason {
  font-size: 12px;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.55;
}

.tm-ai-action {
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: flex-start;
  gap: 5px;
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="/static/Buteforce.png" alt="Buteforce" class="brand-logo">
    <div class="brand-pipe"></div>
    <span class="brand-sub">Outreach Review</span>
  </div>

  <div class="header-stats" id="statsBar">
    <div class="stat-chip">Loading…</div>
  </div>

  <div class="kbd-hints">
    <span><kbd>G</kbd> generate</span>
    <span><kbd>↵</kbd> send</span>
    <span><kbd>S</kbd> skip</span>
  </div>

  <!-- Notification bell -->
  <button class="icon-btn" id="notifBtn" onclick="toggleNotifPanel()" aria-label="Reply notifications">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
    <span class="notif-badge" id="notifBadge">0</span>
  </button>

  <!-- Theme toggle -->
  <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round"></svg>
  </button>
</header>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0"></div>
</div>

<!-- ── Notification panel ──────────────────────────────────────────────── -->
<div class="notif-panel" id="notifPanel">
  <div class="np-head">
    <span class="np-title">Reply Inbox</span>
    <div class="np-actions">
      <button class="np-btn" id="checkNowBtn" onclick="checkNow()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Check now
      </button>
      <button class="np-btn" onclick="markAllRead()">✓ All read</button>
    </div>
  </div>
  <div class="np-list" id="notifList"></div>
</div>

<!-- ── Thread modal ────────────────────────────────────────────────────── -->
<div class="thread-overlay" id="threadOverlay" onclick="handleOverlayClick(event)">
  <div class="thread-modal">
    <div id="threadContent"></div>
  </div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-label">Tier 1 Queue</span>
      <span class="sidebar-progress" id="sidebarCount">—</span>
    </div>
    <div class="lead-list" id="leadList"></div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p>Select a lead to begin</p>
      <small><kbd>G</kbd> generate &nbsp;·&nbsp; <kbd>↵</kbd> approve &amp; send &nbsp;·&nbsp; <kbd>S</kbd> skip</small>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
'use strict';

/* ── Theme ────────────────────────────────────────────────────────────────── */
const MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.innerHTML = theme === 'dark' ? SUN : MOON;
}

function toggleTheme() {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
}

applyTheme(localStorage.getItem('theme') || 'light');

/* ── App state ────────────────────────────────────────────────────────────── */
let queue         = [];
let current       = null;
let notifications = [];
let notifOpen     = false;

/* ── Boot ─────────────────────────────────────────────────────────────────── */
async function boot() {
  try {
    const [qData] = await Promise.all([
      api('GET', '/api/queue'),
      loadNotifications(),
    ]);
    queue = qData.queue;
    applyStats(qData.stats);
    renderList();
  } catch (e) {
    toast('Could not load queue: ' + e.message, 'error');
  }
}

/* ── Stats ────────────────────────────────────────────────────────────────── */
function applyStats(s) {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><strong>${s.pending   ?? 0}</strong> pending</div>
    <div class="stat-chip s-ready"><strong>${s.generated ?? 0}</strong> ready</div>
    <div class="stat-chip s-sent"><strong>${s.sent      ?? 0}</strong> sent</div>
    <div class="stat-chip s-skip"><strong>${s.skipped   ?? 0}</strong> skipped</div>
    <div class="stat-chip"><strong>${s.no_email  ?? 0}</strong> no email</div>
  `;
  const actionable = (s.pending ?? 0) + (s.generated ?? 0) + (s.sent ?? 0) + (s.skipped ?? 0);
  const done       = (s.sent ?? 0) + (s.skipped ?? 0);
  const pct        = actionable > 0 ? (done / actionable * 100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('sidebarCount').textContent = `${done} / ${actionable}`;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
function renderList() {
  const LABELS = { pending: 'Pending', generated: 'Draft ready', sent: 'Sent', skipped: 'Skipped', noemail: 'No email' };
  document.getElementById('leadList').innerHTML = queue.map(item => {
    const hasEmail = !!item.email;
    const key      = !hasEmail ? 'noemail' : item.status;
    const active   = current && String(current.id) === String(item.id) ? 'active' : '';
    const cls      = [active, !hasEmail ? 'is-noemail' : '', item.status === 'sent' ? 'is-sent' : '', item.status === 'skipped' ? 'is-skipped' : ''].filter(Boolean).join(' ');
    const gdpr     = item.gdpr_flag === 'TRUE' ? '<div class="gdpr-pip" title="GDPR — EU lead"></div>' : '';
    return `<div class="lc ${cls}" onclick="selectLead('${item.id}')">
      <div class="lc-top">
        <div class="lc-company">${x(item.company)}</div>
        <div class="lc-spend">${x(item.spent || '?')}</div>
      </div>
      <div class="lc-bottom">
        <div class="status-dot sd-${key}"></div>
        <span class="lc-status">${LABELS[key] ?? key}</span>
        ${gdpr}
      </div>
    </div>`;
  }).join('');
}

/* ── Select lead ──────────────────────────────────────────────────────────── */
function selectLead(id) {
  const item = queue.find(q => String(q.id) === String(id));
  if (!item || !item.email) return;
  current = item;
  renderList();
  renderMain(item);
}

/* ── Main panel ───────────────────────────────────────────────────────────── */
function renderMain(item) {
  const hasEmail   = !!item.email;
  const hasContent = !!(item.subject || item.body);
  const isSent     = item.status === 'sent';
  const isSkipped  = item.status === 'skipped';
  const isGDPR     = item.gdpr_flag === 'TRUE';

  let alerts = '';
  if (isSent)    alerts += `<div class="bar-sent">&#10003; Sent to ${x(item.email)} · ${x(item.sent_at || '')}</div>`;
  if (!hasEmail) alerts += `<div class="bar-noemail">&#9888; No email address — enrich this lead first</div>`;
  if (isGDPR && !isSent) alerts += `<div class="bar-gdpr">&#9888; EU lead (${x(item.country)}) — replace [unsubscribe_link] before sending</div>`;

  const liLink  = item.linkedin ? `<div class="meta"><span class="meta-k">LI</span><a href="${x(item.linkedin)}" target="_blank">Profile</a></div>` : '';
  const jobLink = item.job_link ? `<div class="meta"><span class="meta-k">Job</span><a href="${x(item.job_link)}" target="_blank">${x(item.project_name || 'View')}</a></div>` : '';
  const gapNote = item.missing_data ? `<div class="meta" style="color:var(--amber)"><span class="meta-k">Gap</span>${x(item.missing_data)}</div>` : '';

  const genLabel  = hasContent ? `Regenerate <span class="bk">G</span>` : `Generate email <span class="bk">G</span>`;
  const sendLabel = isSent ? '&#10003; Sent' : `Approve &amp; Send <span class="bk">↵</span>`;

  const brief = item.research_brief || {};
  const hasBrief = !!(brief.company_overview || brief.hook_angles);
  const researchHtml = hasBrief ? `
    <div class="research-panel" id="researchPanel">
      <div class="rp-head" onclick="toggleResearch()">
        <span class="rp-icon">🔍</span>
        <span class="rp-title">Company Research</span>
        ${brief.sources_count ? `<span class="rp-sources">${brief.sources_count} sources</span>` : ''}
        <span class="rp-chevron" id="rpChevron">▾</span>
      </div>
      <div class="rp-body" id="rpBody">
        ${brief.hook_angles   ? `<div class="rp-row rp-hooks"><span class="rp-k">Hook angles</span><span class="rp-v">${x(brief.hook_angles)}</span></div>` : ''}
        ${brief.company_overview ? `<div class="rp-row"><span class="rp-k">Overview</span><span class="rp-v">${x(brief.company_overview)}</span></div>` : ''}
        ${brief.what_they_build  ? `<div class="rp-row"><span class="rp-k">What they build</span><span class="rp-v">${x(brief.what_they_build)}</span></div>` : ''}
        ${brief.tech_stack       ? `<div class="rp-row"><span class="rp-k">Tech stack</span><span class="rp-v">${x(brief.tech_stack)}</span></div>` : ''}
        ${brief.recent_signals   ? `<div class="rp-row"><span class="rp-k">Recent signals</span><span class="rp-v">${x(brief.recent_signals)}</span></div>` : ''}
        ${brief.pain_points      ? `<div class="rp-row"><span class="rp-k">Pain points</span><span class="rp-v">${x(brief.pain_points)}</span></div>` : ''}
      </div>
    </div>` : '';

  document.getElementById('mainPanel').innerHTML = `
    <div class="lead-bar">
      <div class="lead-bar-top">
        <div class="lead-name">${x(item.company)}</div>
        <div class="spend-tag">${x(item.spent || '?')}</div>
      </div>
      <div class="lead-meta">
        <div class="meta"><span class="meta-k">Contact</span>${x(item.contact || 'Unknown')}</div>
        <div class="meta"><span class="meta-k">Country</span>${x(item.country)}</div>
        <div class="meta"><span class="meta-k">Type</span>${x(item.job_type)}</div>
        ${liLink}${jobLink}${gapNote}
      </div>
    </div>
    ${alerts}
    ${researchHtml}
    <div class="compose">
      <div class="email-header">
        <div class="eh-row">
          <span class="eh-label">From</span>
          <span class="eh-value">admin@buteforce.com</span>
        </div>
        <div class="eh-row">
          <span class="eh-label">To</span>
          <span class="eh-value">${x(item.email || '—')}</span>
        </div>
        <div class="eh-row">
          <span class="eh-label">Subject</span>
          <input class="eh-input" id="subjectField"
                 value="${x(item.subject)}"
                 placeholder="Generate to populate…"
                 oninput="saveEdits()"
                 ${isSent ? 'readonly' : ''}>
        </div>
      </div>
      <div class="body-zone">
        <textarea class="body-ta" id="bodyField"
                  placeholder="Click 'Generate email' to write a personalised email in Buteforce style…"
                  oninput="saveEdits(); updateCounter();"
                  ${isSent ? 'readonly' : ''}>${x(item.body)}</textarea>
        <div class="body-counter" id="bodyCounter"></div>
      </div>
      <div class="notes-strip">
        <span class="notes-k">Note</span>
        <input class="notes-in" id="notesField"
               value="${x(item.notes || '')}"
               placeholder="Internal note (not sent)…"
               oninput="saveEdits()">
      </div>
      <div class="action-bar">
        <button class="btn-reset"    onclick="resetLead()"  ${isSent ? 'disabled' : ''}>Reset</button>
        <button class="btn-generate" id="btnGen" onclick="doGenerate()" ${isSent ? 'disabled' : ''}>${genLabel}</button>
        <div class="ab-spacer"></div>
        <button class="btn-skip" onclick="doSkip()" ${isSent || isSkipped ? 'disabled' : ''}>Skip <span class="bk">S</span></button>
        <button class="btn-send" id="btnSend" onclick="doSend()" ${!hasContent || isSent || !hasEmail ? 'disabled' : ''}>${sendLabel}</button>
      </div>
    </div>
  `;
  updateCounter();
}

/* ── Counter ──────────────────────────────────────────────────────────────── */
function updateCounter() {
  const ta = document.getElementById('bodyField');
  const el = document.getElementById('bodyCounter');
  if (!ta || !el) return;
  const words = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  el.textContent = `${words}w · ${ta.value.length}c`;
}

/* ── Auto-save ────────────────────────────────────────────────────────────── */
let _saveTimer = null;
function saveEdits() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!current) return;
    const s = document.getElementById('subjectField')?.value ?? '';
    const b = document.getElementById('bodyField')?.value    ?? '';
    const n = document.getElementById('notesField')?.value   ?? '';
    await api('PUT', `/api/queue/${current.id}`, { subject: s, body: b, notes: n });
    patchLocal({ subject: s, body: b, notes: n });
  }, 500);
}

/* ── Research panel toggle ────────────────────────────────────────────────── */
function toggleResearch() {
  const body    = document.getElementById('rpBody');
  const chevron = document.getElementById('rpChevron');
  if (!body) return;
  const isOpen = body.classList.toggle('open');
  if (chevron) chevron.classList.toggle('open', isOpen);
}

/* ── Generate (two-stage: research → generate) ───────────────────────────── */
async function doGenerate() {
  if (!current) return;
  const btn = document.getElementById('btnGen');
  if (!btn || btn.disabled) return;
  btn.disabled = true;

  // Stage 1 — research
  btn.innerHTML = '<div class="spin"></div> Researching…';
  try {
    const res = await api('POST', `/api/research/${current.id}`);
    patchLocal({ research_brief: res.research_brief });
  } catch (e) {
    // Research failure is non-fatal — log and continue to generate
    console.warn('Research skipped:', e.message);
  }

  // Stage 2 — generate
  btn.innerHTML = '<div class="spin"></div> Generating…';
  try {
    const item = await api('POST', `/api/generate/${current.id}`);
    patchLocal(item);
    renderMain(item);
    // Auto-expand research panel so operator can see what informed the email
    const body = document.getElementById('rpBody');
    const chevron = document.getElementById('rpChevron');
    if (body) { body.classList.add('open'); }
    if (chevron) { chevron.classList.add('open'); }
    toast('Email generated', 'success');
  } catch (e) {
    toast(e.message || 'Generation failed', 'error');
    const b = document.getElementById('btnGen');
    if (b) { b.disabled = false; b.innerHTML = 'Regenerate <span class="bk">G</span>'; }
  }
}

/* ── Send ─────────────────────────────────────────────────────────────────── */
async function doSend() {
  if (!current) return;
  const s = document.getElementById('subjectField')?.value ?? '';
  const b = document.getElementById('bodyField')?.value    ?? '';
  const n = document.getElementById('notesField')?.value   ?? '';
  await api('PUT', `/api/queue/${current.id}`, { subject: s, body: b, notes: n });

  if (current.gdpr_flag === 'TRUE' && b.includes('[unsubscribe_link]')) {
    if (!confirm('GDPR lead — [unsubscribe_link] is still a placeholder.\n\nSend anyway?')) return;
  }

  const btn = document.getElementById('btnSend');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Sending…';
  try {
    const resp = await api('POST', `/api/send/${current.id}`);
    patchLocal(resp.item);
    await refreshQueue();
    renderMain(resp.item);
    toast(`Sent to ${resp.item.email}`, 'success');
  } catch (e) {
    toast(e.message || 'Send failed', 'error');
    const b2 = document.getElementById('btnSend');
    if (b2) { b2.disabled = false; b2.innerHTML = 'Approve &amp; Send <span class="bk">↵</span>'; }
  }
}

/* ── Skip / Reset ─────────────────────────────────────────────────────────── */
async function doSkip() {
  if (!current) return;
  if (!confirm(`Skip ${current.company}? You can reset it later.`)) return;
  const item = await api('POST', `/api/skip/${current.id}`);
  patchLocal(item);
  await refreshQueue();
  renderMain(item);
  toast('Skipped', 'info');
}

async function resetLead() {
  if (!current) return;
  if (!confirm(`Reset ${current.company}? This clears the draft.`)) return;
  const item = await api('POST', `/api/reset/${current.id}`);
  patchLocal(item);
  renderMain(item);
  toast('Reset to pending', 'info');
}

/* ── Keyboard shortcuts ───────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const tag = (e.target?.tagName ?? '').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (e.key === 'Escape') { closeThread(); closeNotifPanel(); return; }
  if (!current?.email) return;
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); doGenerate(); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); doSkip(); }
  if (e.key === 'Enter') {
    const btn = document.getElementById('btnSend');
    if (btn && !btn.disabled) { e.preventDefault(); doSend(); }
  }
});

/* ═══════════════════════════════════════════════════════════════════════════
   NOTIFICATION CENTER
   ═══════════════════════════════════════════════════════════════════════════ */

const CLS_LABELS = {
  interested:        'Interested',
  meeting_requested: 'Meeting',
  question:          'Question',
  not_interested:    'Not interested',
  out_of_office:     'OOO',
  unsubscribe:       'Unsubscribe',
  other:             'Other',
};

async function loadNotifications() {
  try {
    const data = await api('GET', '/api/notifications');
    notifications = data.notifications || [];
    renderNotifBadge(data.unread || 0);
    if (notifOpen) renderNotifList();
  } catch (_) { /* non-critical */ }
}

function renderNotifBadge(count) {
  const btn   = document.getElementById('notifBtn');
  const badge = document.getElementById('notifBadge');
  if (!badge || !btn) return;
  if (count > 0) {
    badge.textContent    = count > 99 ? '99+' : String(count);
    badge.style.display  = 'flex';
    btn.classList.add('has-unread');
  } else {
    badge.style.display  = 'none';
    btn.classList.remove('has-unread');
  }
}

function toggleNotifPanel() {
  notifOpen ? closeNotifPanel() : openNotifPanel();
}

function openNotifPanel() {
  notifOpen = true;
  const panel = document.getElementById('notifPanel');
  if (panel) { panel.style.display = 'flex'; renderNotifList(); }
}

function closeNotifPanel() {
  notifOpen = false;
  const panel = document.getElementById('notifPanel');
  if (panel) panel.style.display = 'none';
}

function renderNotifList() {
  const list = document.getElementById('notifList');
  if (!list) return;

  if (!notifications.length) {
    list.innerHTML = `
      <div class="np-empty">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <p>No replies yet</p>
        <small>Replies to sent emails appear here</small>
      </div>`;
    return;
  }

  list.innerHTML = notifications.map(n => {
    const cls     = n.classification || 'other';
    const label   = CLS_LABELS[cls] || cls;
    const preview = (n.reply_body || '').replace(/\s+/g, ' ').slice(0, 130);
    const dot     = n.read ? '' : '<div class="ni-unread-dot"></div>';
    return `<div class="ni ${n.read ? 'is-read' : ''}" onclick="openThread('${x(n.id)}')">
      ${dot}
      <div class="ni-head">
        <span class="ni-company">${x(n.company)}</span>
        <span class="cls-badge cls-${cls}">${label}</span>
      </div>
      <div class="ni-preview">${x(preview)}</div>
      <div class="ni-meta">${x(n.reply_from)} · ${timeAgo(n.reply_at)}</div>
    </div>`;
  }).join('');
}

async function checkNow() {
  const btn = document.getElementById('checkNowBtn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spin" style="border-color:rgba(0,0,0,.15);border-top-color:#0a0a0a;width:10px;height:10px;border-width:1.5px"></div> Checking…'; }
  try {
    const data = await api('POST', '/api/notifications/check');
    notifications = data.notifications || [];
    renderNotifBadge(data.unread || 0);
    renderNotifList();
    toast(data.new > 0 ? `${data.new} new repl${data.new === 1 ? 'y' : 'ies'}` : 'No new replies', data.new > 0 ? 'success' : 'info');
  } catch (e) {
    toast('Check failed: ' + e.message, 'error');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg> Check now`;
    }
  }
}

async function markAllRead() {
  await api('PUT', '/api/notifications/all/read').catch(() => {});
  notifications.forEach(n => n.read = true);
  renderNotifBadge(0);
  renderNotifList();
}

function openThread(notifId) {
  const notif = notifications.find(n => n.id === notifId);
  if (!notif) return;

  if (!notif.read) {
    notif.read = true;
    api('PUT', `/api/notifications/${encodeURIComponent(notifId)}/read`).catch(() => {});
    renderNotifBadge(notifications.filter(n => !n.read).length);
    renderNotifList();
  }

  renderThreadContent(notif);
  document.getElementById('threadOverlay').style.display = 'flex';
}

function closeThread() {
  document.getElementById('threadOverlay').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === e.currentTarget) closeThread();
}

function renderThreadContent(notif) {
  const cls   = notif.classification || 'other';
  const label = CLS_LABELS[cls] || cls;

  const bodyHtml = x(notif.reply_body || '—').replace(/\n/g, '<br>');

  const aiCard = notif.reason ? `
    <div class="tm-ai-card">
      <div class="tm-ai-label">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        AI Analysis
      </div>
      <div class="tm-ai-reason">${x(notif.reason)}</div>
      ${notif.suggested_action ? `<div class="tm-ai-action">→ ${x(notif.suggested_action)}</div>` : ''}
    </div>` : '';

  document.getElementById('threadContent').innerHTML = `
    <div class="tm-head">
      <div class="tm-head-left">
        <div class="tm-company">${x(notif.company)}</div>
        <span class="cls-badge cls-${cls}">${label}</span>
      </div>
      <button class="tm-close" onclick="closeThread()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="tm-body">
      <div class="tm-email-card tm-outreach">
        <div class="tm-card-label">Your outreach</div>
        <div class="tm-card-subject">${x(notif.original_subject || '(no subject)')}</div>
        <div class="tm-card-meta">To: ${x(notif.recipient_email)}</div>
      </div>
      <div class="tm-arrow">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
        </svg>
        They replied
      </div>
      <div class="tm-email-card tm-reply">
        <div class="tm-card-label">Their reply · ${x(notif.reply_at || '')}</div>
        <div class="tm-card-subject">${x(notif.reply_subject || '(no subject)')}</div>
        <div class="tm-card-meta">From: ${x(notif.reply_from)}</div>
        <div class="tm-card-body">${bodyHtml}</div>
      </div>
      ${aiCard}
    </div>
  `;
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  try {
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 1000);
    if (diff < 60)    return 'just now';
    if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
    return `${Math.floor(diff / 86400)}d ago`;
  } catch { return dateStr; }
}

/* Close panel on outside click */
document.addEventListener('click', e => {
  if (!notifOpen) return;
  const panel = document.getElementById('notifPanel');
  const btn   = document.getElementById('notifBtn');
  if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
    closeNotifPanel();
  }
});

/* Poll every 5 minutes */
setInterval(loadNotifications, 5 * 60 * 1000);

/* ═══════════════════════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════════════════════ */

async function refreshQueue() {
  const data = await api('GET', '/api/queue');
  queue = data.queue;
  applyStats(data.stats);
  renderList();
}

function patchLocal(updates) {
  if (!current) return;
  Object.assign(current, updates);
  const idx = queue.findIndex(q => String(q.id) === String(current.id));
  if (idx !== -1) Object.assign(queue[idx], updates);
  renderList();
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(url, opts);
  const data = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

function x(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let _toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = type; }, 3000);
}

boot();
</script>
