<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buteforce · Outreach</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens: light theme (brand-default per brand_bible.md 2026-04-12) ──── */
:root {
  --bg:          #f7f8fa;
  --surface:     #ffffff;
  --surface-2:   #eef0f3;
  --border:      #e5e7eb;
  --border-2:    #d1d5db;
  --text:        #0f172a;
  --text-2:      #475569;
  --text-3:      #94a3b8;

  --yellow:      #FFFC01;
  --yellow-dim:  rgba(255,252,1,.14);
  --yellow-glow: rgba(255,252,1,.45);
  --accent:      #FFFC01;
  --accent-dim:  rgba(255,252,1,.12);
  --accent-glow: rgba(255,252,1,.12);

  --green:       #16a34a;
  --green-dim:   rgba(22,163,74,.09);
  --amber:       #b45309;
  --amber-dim:   rgba(180,83,9,.09);
  --red:         #dc2626;
  --red-dim:     rgba(220,38,38,.09);

  --hover-tint:  rgba(0,0,0,.04);
  --mono: 'Cascadia Code','JetBrains Mono','Fira Code','SF Mono',ui-monospace,monospace;
}

/* ── Tokens: dark theme ───────────────────────────────────────────────────── */
[data-theme="dark"] {
  --bg:          #07090d;
  --surface:     #0d1018;
  --surface-2:   #13161f;
  --border:      #1e2535;
  --border-2:    #2a3246;
  --text:        #dde1ef;
  --text-2:      #7a8099;
  --text-3:      #3a3f52;
  --yellow-dim:  rgba(255,252,1,.07);
  --yellow-glow: rgba(255,252,1,.20);
  --accent-dim:  rgba(255,252,1,.07);
  --accent-glow: rgba(255,252,1,.05);
  --green:       #22c763;
  --green-dim:   rgba(34,199,99,.10);
  --amber:       #f0a500;
  --amber-dim:   rgba(240,165,0,.08);
  --red:         #ef4455;
  --red-dim:     rgba(239,68,85,.08);
  --hover-tint:  rgba(255,255,255,.03);
}

body {
  font-family: system-ui,-apple-system,'Segoe UI',sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
header {
  height: 46px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  user-select: none;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.brand-logo {
  height: 26px;
  width: auto;
  object-fit: contain;
  display: block;
}

[data-theme="dark"] .brand-logo {
  filter: brightness(1.15) contrast(1.05);
}

.brand-pipe {
  width: 1px;
  height: 14px;
  background: var(--border-2);
  flex-shrink: 0;
}

.brand-sub {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
  letter-spacing: .01em;
}

/* Stats */
.header-stats {
  display: flex;
  align-items: center;
  gap: 1px;
  margin-left: auto;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}

.stat-chip {
  padding: 4px 11px;
  background: var(--surface-2);
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 5px;
  font-variant-numeric: tabular-nums;
}

.stat-chip strong { color: var(--text-2); font-weight: 600; }
.stat-chip.s-sent  strong { color: var(--green); }
.stat-chip.s-skip  strong { color: var(--red); }
.stat-chip.s-ready strong { color: var(--amber); }

/* Kbd hints */
.kbd-hints {
  display: flex;
  gap: 10px;
  font-size: 11px;
  color: var(--text-3);
  flex-shrink: 0;
}

kbd {
  font-family: var(--mono);
  font-size: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 3px;
  padding: 0 4px;
  color: var(--text-2);
  line-height: 16px;
}

/* Theme toggle */
.theme-toggle {
  width: 30px;
  height: 30px;
  padding: 0;
  background: var(--surface-2);
  border: 1px solid var(--border-2);
  border-radius: 5px;
  color: var(--text-2);
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  transition: background .12s, border-color .12s;
}
.theme-toggle:hover { background: var(--border); }
.theme-toggle svg { width: 14px; height: 14px; }

/* ── Progress bar ─────────────────────────────────────────────────────────── */
.progress-track {
  height: 2px;
  background: var(--border);
  flex-shrink: 0;
}

.progress-fill {
  height: 100%;
  background: var(--yellow);
  transition: width .5s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 10px var(--yellow-glow);
}

/* ── Layout ───────────────────────────────────────────────────────────────── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
.sidebar {
  width: 252px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  background: var(--surface);
}

.sidebar-head {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.sidebar-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-3);
}

.sidebar-progress {
  font-size: 11px;
  color: var(--text-2);
  font-variant-numeric: tabular-nums;
  font-family: var(--mono);
}

.lead-list {
  overflow-y: auto;
  flex: 1;
}

/* Lead card */
.lc {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: background .1s;
}

.lc:hover { background: var(--hover-tint); }

.lc.active {
  background: var(--yellow-dim);
  border-left: 2px solid var(--yellow);
  padding-left: 12px;
}

.lc.is-noemail { opacity: .35; cursor: default; pointer-events: none; }
.lc.is-sent    { opacity: .6; }
.lc.is-skipped { opacity: .5; }

.lc-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 5px;
}

.lc-company {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--text);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
  letter-spacing: -.01em;
}

.lc-spend {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-2);
  flex-shrink: 0;
  letter-spacing: -.02em;
}

.lc-bottom {
  display: flex;
  align-items: center;
  gap: 5px;
}

.status-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sd-pending   { background: var(--text-3); }
.sd-generated { background: var(--amber); }
.sd-sent      { background: var(--green); }
.sd-skipped   { background: var(--red); opacity: .5; }
.sd-noemail   { background: var(--border-2); }

.lc-status {
  font-size: 10.5px;
  color: var(--text-3);
}

.gdpr-pip {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--amber);
  margin-left: auto;
  flex-shrink: 0;
}

/* ── Main ─────────────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: var(--text-3);
  pointer-events: none;
}

.empty-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  border: 1px solid var(--border-2);
  display: grid;
  place-items: center;
}

.empty-state p { font-size: 13px; }
.empty-state small { font-size: 11px; }

/* Lead header bar */
.lead-bar {
  padding: 13px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.lead-bar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 7px;
}

.lead-name {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
}

/* Spend tag: brand yellow bg with dark text — works on both themes */
.spend-tag {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 800;
  color: var(--text);
  background: var(--yellow);
  padding: 2px 10px;
  border-radius: 4px;
  letter-spacing: -.02em;
}

.lead-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
}

.meta {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-2);
}

.meta-k {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
}

.meta a {
  color: var(--text-2);
  text-decoration: underline;
  text-decoration-color: var(--border-2);
}
.meta a:hover { text-decoration-color: var(--text-2); }

/* Alert bars */
.bar-sent {
  padding: 7px 20px;
  background: var(--green-dim);
  border-bottom: 1px solid rgba(22,163,74,.15);
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

.bar-gdpr {
  padding: 7px 20px;
  background: var(--amber-dim);
  border-bottom: 1px solid rgba(180,83,9,.12);
  font-size: 11px;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
}

[data-theme="dark"] .bar-gdpr {
  border-bottom-color: rgba(240,165,0,.12);
}

.bar-noemail {
  padding: 9px 20px;
  background: var(--red-dim);
  border-bottom: 1px solid rgba(220,38,38,.15);
  font-size: 12px;
  color: var(--red);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* Compose */
.compose {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.email-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.eh-row {
  display: flex;
  align-items: center;
  height: 34px;
  padding: 0 20px;
  border-bottom: 1px solid var(--border);
}
.eh-row:last-child { border-bottom: none; }

.eh-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  width: 52px;
  flex-shrink: 0;
}

.eh-value {
  font-size: 12.5px;
  color: var(--text-2);
  flex: 1;
}

.eh-input {
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  background: none;
  border: none;
  outline: none;
  flex: 1;
  width: 100%;
}
.eh-input::placeholder { color: var(--text-3); font-weight: 400; font-style: italic; }

.body-zone {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  position: relative;
}

.body-ta {
  flex: 1;
  width: 100%;
  background: var(--bg);
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12.5px;
  line-height: 1.8;
  padding: 16px 20px 32px;
  resize: none;
  overflow-y: auto;
}
.body-ta::placeholder { color: var(--text-3); font-style: italic; }

.body-counter {
  position: absolute;
  bottom: 8px;
  right: 16px;
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text-3);
  pointer-events: none;
}

/* Notes */
.notes-strip {
  height: 34px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.notes-k {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text-3);
  flex-shrink: 0;
}

.notes-in {
  flex: 1;
  font-family: inherit;
  font-size: 12px;
  color: var(--text-2);
  background: none;
  border: none;
  outline: none;
}
.notes-in::placeholder { color: var(--text-3); }

/* Action bar */
.action-bar {
  height: 50px;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 20px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.ab-spacer { flex: 1; }

/* Buttons */
button {
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  padding: 0 14px;
  height: 32px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: opacity .12s, transform .1s, background .12s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  outline: none;
}

button:hover:not(:disabled) { opacity: .82; }
button:active:not(:disabled) { transform: scale(.98); }
button:disabled { opacity: .28; cursor: not-allowed; }
button:focus-visible { box-shadow: 0 0 0 2px var(--yellow); }

.btn-reset {
  background: transparent;
  color: var(--text-3);
  border: 1px solid var(--border-2);
}
.btn-reset:hover:not(:disabled) { color: var(--text-2); opacity: 1; }

/* Brand-yellow generate button — the hero action */
.btn-generate {
  background: var(--yellow);
  color: #0f172a;
  font-weight: 700;
}

.btn-skip {
  background: transparent;
  color: var(--text-2);
  border: 1px solid var(--border-2);
}
.btn-skip:hover:not(:disabled) {
  color: var(--red);
  border-color: rgba(220,38,38,.35);
  background: var(--red-dim);
  opacity: 1;
}

.btn-send {
  background: var(--green);
  color: #ffffff;
  font-weight: 700;
  font-size: 13px;
  padding: 0 18px;
}
[data-theme="dark"] .btn-send { color: #071a0e; }

/* Keyboard shortcut badge inside buttons */
.bk {
  font-family: var(--mono);
  font-size: 9px;
  opacity: .55;
  background: rgba(15,23,42,.12);
  padding: 1px 4px;
  border-radius: 3px;
  line-height: 14px;
}
[data-theme="dark"] .bk { background: rgba(255,255,255,.12); }

/* Loading spinner */
.spin {
  width: 12px;
  height: 12px;
  border: 2px solid rgba(15,23,42,.2);
  border-top-color: #0f172a;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
[data-theme="dark"] .spin {
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: white;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
#toast {
  position: fixed;
  bottom: 18px;
  right: 18px;
  padding: 9px 15px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity .18s, transform .18s;
  pointer-events: none;
  z-index: 9999;
  max-width: 300px;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.success { background: var(--green-dim); border: 1px solid rgba(22,163,74,.25); color: var(--green); }
#toast.error   { background: var(--red-dim);   border: 1px solid rgba(220,38,38,.25); color: var(--red); }
#toast.info    { background: var(--surface-2); border: 1px solid var(--border-2);    color: var(--text-2); }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 99px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-3); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="/static/Buteforce.png" alt="Buteforce" class="brand-logo">
    <div class="brand-pipe"></div>
    <span class="brand-sub">Outreach Review</span>
  </div>

  <div class="header-stats" id="statsBar">
    <div class="stat-chip">Loading…</div>
  </div>

  <div class="kbd-hints">
    <span><kbd>G</kbd> generate</span>
    <span><kbd>↵</kbd> send</span>
    <span><kbd>S</kbd> skip</span>
  </div>

  <button class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme" aria-label="Toggle theme">
    <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round"></svg>
  </button>
</header>

<div class="progress-track">
  <div class="progress-fill" id="progressFill" style="width:0"></div>
</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="sidebar-label">Tier 1 Queue</span>
      <span class="sidebar-progress" id="sidebarCount">—</span>
    </div>
    <div class="lead-list" id="leadList"></div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
        </svg>
      </div>
      <p>Select a lead to begin</p>
      <small><kbd>G</kbd> generate &nbsp;·&nbsp; <kbd>↵</kbd> approve &amp; send &nbsp;·&nbsp; <kbd>S</kbd> skip</small>
    </div>
  </main>

</div>

<div id="toast"></div>

<script>
'use strict';

/* ── Theme ────────────────────────────────────────────────────────────────── */
const MOON_SVG = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
const SUN_SVG  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.innerHTML = theme === 'dark' ? SUN_SVG : MOON_SVG;
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next    = current === 'dark' ? 'light' : 'dark';
  localStorage.setItem('theme', next);
  applyTheme(next);
}

/* Apply saved theme immediately (before render) */
applyTheme(localStorage.getItem('theme') || 'light');


/* ── App state ────────────────────────────────────────────────────────────── */
let queue   = [];
let current = null;

/* ── Boot ─────────────────────────────────────────────────────────────────── */
async function boot() {
  try {
    const data = await api('GET', '/api/queue');
    queue = data.queue;
    applyStats(data.stats);
    renderList();
  } catch (e) {
    toast('Could not load queue: ' + e.message, 'error');
  }
}

/* ── Stats ────────────────────────────────────────────────────────────────── */
function applyStats(s) {
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><strong>${s.pending    ?? 0}</strong> pending</div>
    <div class="stat-chip s-ready"><strong>${s.generated  ?? 0}</strong> ready</div>
    <div class="stat-chip s-sent"><strong>${s.sent       ?? 0}</strong> sent</div>
    <div class="stat-chip s-skip"><strong>${s.skipped    ?? 0}</strong> skipped</div>
    <div class="stat-chip"><strong>${s.no_email   ?? 0}</strong> no email</div>
  `;
  const actionable = (s.pending ?? 0) + (s.generated ?? 0) + (s.sent ?? 0) + (s.skipped ?? 0);
  const done       = (s.sent ?? 0) + (s.skipped ?? 0);
  const pct        = actionable > 0 ? (done / actionable * 100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('sidebarCount').textContent = `${done} / ${actionable}`;
}

/* ── Sidebar ──────────────────────────────────────────────────────────────── */
function renderList() {
  const STATUS_LABELS = {
    pending: 'Pending', generated: 'Draft ready',
    sent: 'Sent', skipped: 'Skipped', noemail: 'No email'
  };
  document.getElementById('leadList').innerHTML = queue.map(item => {
    const hasEmail = !!item.email;
    const key      = !hasEmail ? 'noemail' : item.status;
    const active   = current && String(current.id) === String(item.id) ? 'active' : '';
    const cls      = [active, !hasEmail ? 'is-noemail' : '', item.status === 'sent' ? 'is-sent' : '', item.status === 'skipped' ? 'is-skipped' : ''].filter(Boolean).join(' ');
    const gdpr     = item.gdpr_flag === 'TRUE' ? '<div class="gdpr-pip" title="GDPR — EU lead"></div>' : '';
    return `<div class="lc ${cls}" onclick="selectLead('${item.id}')">
      <div class="lc-top">
        <div class="lc-company">${x(item.company)}</div>
        <div class="lc-spend">${x(item.spent || '?')}</div>
      </div>
      <div class="lc-bottom">
        <div class="status-dot sd-${key}"></div>
        <span class="lc-status">${STATUS_LABELS[key] ?? key}</span>
        ${gdpr}
      </div>
    </div>`;
  }).join('');
}

/* ── Select lead ──────────────────────────────────────────────────────────── */
function selectLead(id) {
  const item = queue.find(q => String(q.id) === String(id));
  if (!item || !item.email) return;
  current = item;
  renderList();
  renderMain(item);
}

/* ── Main panel ───────────────────────────────────────────────────────────── */
function renderMain(item) {
  const hasEmail   = !!item.email;
  const hasContent = !!(item.subject || item.body);
  const isSent     = item.status === 'sent';
  const isSkipped  = item.status === 'skipped';
  const isGDPR     = item.gdpr_flag === 'TRUE';

  let alerts = '';
  if (isSent)
    alerts += `<div class="bar-sent">&#10003; Sent to ${x(item.email)} · ${x(item.sent_at || '')}</div>`;
  if (!hasEmail)
    alerts += `<div class="bar-noemail">&#9888; No email address — enrich this lead first</div>`;
  if (isGDPR && !isSent)
    alerts += `<div class="bar-gdpr">&#9888; EU lead (${x(item.country)}) — replace [unsubscribe_link] before sending</div>`;

  const liLink  = item.linkedin
    ? `<div class="meta"><span class="meta-k">LI</span><a href="${x(item.linkedin)}" target="_blank">Profile</a></div>` : '';
  const jobLink = item.job_link
    ? `<div class="meta"><span class="meta-k">Job</span><a href="${x(item.job_link)}" target="_blank">${x(item.project_name || 'View')}</a></div>` : '';
  const gapNote = item.missing_data
    ? `<div class="meta" style="color:var(--amber)"><span class="meta-k">Gap</span>${x(item.missing_data)}</div>` : '';

  const genLabel  = hasContent
    ? `Regenerate <span class="bk">G</span>`
    : `Generate email <span class="bk">G</span>`;
  const sendLabel = isSent ? '&#10003; Sent' : `Approve &amp; Send <span class="bk">↵</span>`;

  document.getElementById('mainPanel').innerHTML = `
    <div class="lead-bar">
      <div class="lead-bar-top">
        <div class="lead-name">${x(item.company)}</div>
        <div class="spend-tag">${x(item.spent || '?')}</div>
      </div>
      <div class="lead-meta">
        <div class="meta"><span class="meta-k">Contact</span>${x(item.contact || 'Unknown')}</div>
        <div class="meta"><span class="meta-k">Country</span>${x(item.country)}</div>
        <div class="meta"><span class="meta-k">Type</span>${x(item.job_type)}</div>
        ${liLink}${jobLink}${gapNote}
      </div>
    </div>

    ${alerts}

    <div class="compose">
      <div class="email-header">
        <div class="eh-row">
          <span class="eh-label">From</span>
          <span class="eh-value">admin@buteforce.com</span>
        </div>
        <div class="eh-row">
          <span class="eh-label">To</span>
          <span class="eh-value">${x(item.email || '—')}</span>
        </div>
        <div class="eh-row">
          <span class="eh-label">Subject</span>
          <input class="eh-input" id="subjectField"
                 value="${x(item.subject)}"
                 placeholder="Generate to populate…"
                 oninput="saveEdits()"
                 ${isSent ? 'readonly' : ''}>
        </div>
      </div>

      <div class="body-zone">
        <textarea class="body-ta" id="bodyField"
                  placeholder="Click 'Generate email' to write a personalised email in Buteforce style…"
                  oninput="saveEdits(); updateCounter();"
                  ${isSent ? 'readonly' : ''}>${x(item.body)}</textarea>
        <div class="body-counter" id="bodyCounter"></div>
      </div>

      <div class="notes-strip">
        <span class="notes-k">Note</span>
        <input class="notes-in" id="notesField"
               value="${x(item.notes || '')}"
               placeholder="Internal note (not sent)…"
               oninput="saveEdits()">
      </div>

      <div class="action-bar">
        <button class="btn-reset"    onclick="resetLead()"    ${isSent ? 'disabled' : ''}>Reset</button>
        <button class="btn-generate" id="btnGen" onclick="doGenerate()" ${isSent ? 'disabled' : ''}>${genLabel}</button>
        <div class="ab-spacer"></div>
        <button class="btn-skip"  onclick="doSkip()"  ${isSent || isSkipped ? 'disabled' : ''}>Skip <span class="bk">S</span></button>
        <button class="btn-send"  id="btnSend" onclick="doSend()" ${!hasContent || isSent || !hasEmail ? 'disabled' : ''}>${sendLabel}</button>
      </div>
    </div>
  `;
  updateCounter();
}

/* ── Word / char counter ──────────────────────────────────────────────────── */
function updateCounter() {
  const ta = document.getElementById('bodyField');
  const el = document.getElementById('bodyCounter');
  if (!ta || !el) return;
  const words = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
  el.textContent = `${words}w · ${ta.value.length}c`;
}

/* ── Auto-save (debounced 500ms) ──────────────────────────────────────────── */
let _saveTimer = null;
function saveEdits() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!current) return;
    const s = document.getElementById('subjectField')?.value ?? '';
    const b = document.getElementById('bodyField')?.value    ?? '';
    const n = document.getElementById('notesField')?.value   ?? '';
    await api('PUT', `/api/queue/${current.id}`, { subject: s, body: b, notes: n });
    patchLocal({ subject: s, body: b, notes: n });
  }, 500);
}

/* ── Generate ─────────────────────────────────────────────────────────────── */
async function doGenerate() {
  if (!current) return;
  const btn = document.getElementById('btnGen');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Generating…';
  try {
    const item = await api('POST', `/api/generate/${current.id}`);
    patchLocal(item);
    renderMain(item);
    toast('Email generated', 'success');
  } catch (e) {
    toast(e.message || 'Generation failed', 'error');
    const b = document.getElementById('btnGen');
    if (b) { b.disabled = false; b.innerHTML = 'Regenerate <span class="bk">G</span>'; }
  }
}

/* ── Send ─────────────────────────────────────────────────────────────────── */
async function doSend() {
  if (!current) return;
  const s = document.getElementById('subjectField')?.value ?? '';
  const b = document.getElementById('bodyField')?.value    ?? '';
  const n = document.getElementById('notesField')?.value   ?? '';
  await api('PUT', `/api/queue/${current.id}`, { subject: s, body: b, notes: n });

  if (current.gdpr_flag === 'TRUE' && b.includes('[unsubscribe_link]')) {
    if (!confirm('GDPR lead — [unsubscribe_link] is still a placeholder.\n\nSend anyway?')) return;
  }

  const btn = document.getElementById('btnSend');
  if (!btn || btn.disabled) return;
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div> Sending…';
  try {
    const resp = await api('POST', `/api/send/${current.id}`);
    patchLocal(resp.item);
    await refreshQueue();
    renderMain(resp.item);
    toast(`Sent to ${resp.item.email}`, 'success');
  } catch (e) {
    toast(e.message || 'Send failed', 'error');
    const b2 = document.getElementById('btnSend');
    if (b2) { b2.disabled = false; b2.innerHTML = 'Approve &amp; Send <span class="bk">↵</span>'; }
  }
}

/* ── Skip ─────────────────────────────────────────────────────────────────── */
async function doSkip() {
  if (!current) return;
  if (!confirm(`Skip ${current.company}? You can reset it later.`)) return;
  const item = await api('POST', `/api/skip/${current.id}`);
  patchLocal(item);
  await refreshQueue();
  renderMain(item);
  toast('Skipped', 'info');
}

/* ── Reset ────────────────────────────────────────────────────────────────── */
async function resetLead() {
  if (!current) return;
  if (!confirm(`Reset ${current.company}? This clears the draft.`)) return;
  const item = await api('POST', `/api/reset/${current.id}`);
  patchLocal(item);
  renderMain(item);
  toast('Reset to pending', 'info');
}

/* ── Keyboard shortcuts ───────────────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  const tag = (e.target?.tagName ?? '').toLowerCase();
  if (tag === 'input' || tag === 'textarea') return;
  if (!current?.email) return;
  if (e.key === 'g' || e.key === 'G') { e.preventDefault(); doGenerate(); }
  if (e.key === 's' || e.key === 'S') { e.preventDefault(); doSkip(); }
  if (e.key === 'Enter') {
    const btn = document.getElementById('btnSend');
    if (btn && !btn.disabled) { e.preventDefault(); doSend(); }
  }
});

/* ── Helpers ──────────────────────────────────────────────────────────────── */
async function refreshQueue() {
  const data = await api('GET', '/api/queue');
  queue = data.queue;
  applyStats(data.stats);
  renderList();
}

function patchLocal(updates) {
  if (!current) return;
  Object.assign(current, updates);
  const idx = queue.findIndex(q => String(q.id) === String(current.id));
  if (idx !== -1) Object.assign(queue[idx], updates);
  renderList();
}

async function api(method, url, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res  = await fetch(url, opts);
  const data = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

function x(v) {
  return String(v ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _toastTimer = null;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = type; }, 3000);
}

boot();
</script>
</body>
</html>
